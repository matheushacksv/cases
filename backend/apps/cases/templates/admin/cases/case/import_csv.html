{% extends "admin/base_site.html" %}
{% block content %}

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <p>Colunas: <code>nome, nicho, resultado</code> (separador <code>,</code> ou <code>;</code>).</p>
    <p><input type="file" name="csv_file" accept=".csv" required></p>
    <button type="submit" class="default">Importar</button>
</form>

{% endblock %}
