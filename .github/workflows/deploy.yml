name: deploy
on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /opt/cases
            git pull --ff-only
            docker build -t cases-backend:latest ./backend
            docker build -t cases-frontend:latest ./frontend
            docker stack deploy -c docker-compose.yml cases
            docker service update --image cases-backend:latest --force cases_backend
            docker service update --image cases-frontend:latest --force cases_frontend
